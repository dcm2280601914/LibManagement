<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý người mượn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #999;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            margin-top: 20px;
        }
        a, button {
            margin-right: 5px;
        }
    </style>
</head>
<body>

<h1>Quản lý người mượn</h1>

<div class="top-bar">
    <div>
        <a th:href="@{/}">Trang chủ</a>
        <a th:href="@{/borrowers/add}">Thêm người mượn</a>
    </div>
</div>

<div class="search-box">
    <form th:action="@{/borrowers}" method="get">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Nhập tên người mượn cần tìm">
        <button type="submit">Tìm kiếm</button>
        <a th:href="@{/borrowers}">Làm mới</a>
    </form>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Họ tên</th>
        <th>Số điện thoại</th>
        <th>Email</th>
        <th>Địa chỉ</th>
        <th>Số định danh</th>
        <th>Chức năng</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="borrower : ${borrowers}">
        <td th:text="${borrower.id}"></td>
        <td th:text="${borrower.fullName}"></td>
        <td th:text="${borrower.phone}"></td>
        <td th:text="${borrower.email}"></td>
        <td th:text="${borrower.address}"></td>
        <td th:text="${borrower.identityNumber}"></td>
        <td>
            <a th:href="@{/borrowers/detail/{id}(id=${borrower.id})}">Chi tiết</a>
            <a th:href="@{/borrowers/edit/{id}(id=${borrower.id})}">Sửa</a>
            <a th:href="@{/borrowers/delete/{id}(id=${borrower.id})}"
               onclick="return confirm('Bạn có chắc muốn xóa người mượn này không?')">Xóa</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(borrowers)}">
        <td colspan="7">Không có dữ liệu người mượn</td>
    </tr>
    </tbody>
</table>

</body>
</html>
