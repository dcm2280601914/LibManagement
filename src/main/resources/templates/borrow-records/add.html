<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm phiếu mượn</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        form { width: 550px; }
        div { margin-bottom: 12px; }
        input, select, textarea { width: 100%; padding: 8px; }
    </style>
</head>
<body>

<h1>Thêm phiếu mượn</h1>

<form th:action="@{/borrow-records/save}" method="post">

    <div>
        <label>Mã mượn:</label>
        <input type="text" name="borrowCode" required>
    </div>

    <div>
        <label>Người mượn:</label>
        <select name="borrower.id" required>
            <option value="">-- Chọn người mượn --</option>
            <option th:each="b : ${borrowers}"
                    th:value="${b.id}"
                    th:text="${b.fullName}">
            </option>
        </select>
    </div>

    <div>
        <label>Nhân viên ghi nhận:</label>
        <select name="employee.id" required>
            <option value="">-- Chọn nhân viên --</option>
            <option th:each="e : ${employees}"
                    th:value="${e.id}"
                    th:text="${e.fullName}">
            </option>
        </select>
    </div>

    <div>
        <label>Sách:</label>
        <select name="book.id" required>
            <option value="">-- Chọn sách --</option>
            <option th:each="book : ${books}"
                    th:value="${book.id}"
                    th:text="${book.title}">
            </option>
        </select>
    </div>

    <div>
        <label>Ngày mượn:</label>
        <input type="date" name="borrowDate" required>
    </div>

    <div>
        <label>Hạn trả:</label>
        <input type="date" name="dueDate" required>
    </div>

    <div>
        <label>Trạng thái:</label>
        <select name="status" required>
            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
        </select>
    </div>

    <div>
        <label>Ghi chú:</label>
        <textarea name="note" rows="4"></textarea>
    </div>

    <button type="submit">Lưu</button>
    <a th:href="@{/borrow-records}">Quay lại</a>
</form>

</body>
</html>
