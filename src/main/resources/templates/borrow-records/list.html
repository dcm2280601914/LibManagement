<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phiếu mượn sách</title>
    <style>
        body { font-family: Arial; margin: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #999; }
        th, td { padding: 10px; }
    </style>
</head>
<body>

<h1>Quản lý mượn sách</h1>

<a th:href="@{/}">Trang chủ</a>
<a th:href="@{/borrow-records/add}">Thêm phiếu mượn</a>

<form th:action="@{/borrow-records}" method="get">
    <input type="text" name="keyword" placeholder="Tìm theo tên người mượn">
    <button type="submit">Tìm</button>
</form>

<table>
    <thead>
    <tr>
        <th>Mã</th>
        <th>Người mượn</th>
        <th>Sách</th>
        <th>Ngày mượn</th>
        <th>Hạn trả</th>
        <th>Trạng thái</th>
        <th>Chức năng</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="b : ${borrowRecords}">
        <td th:text="${b.borrowCode}"></td>
        <td th:text="${b.borrower.fullName}"></td>
        <td th:text="${b.book.title}"></td>
        <td th:text="${b.borrowDate}"></td>
        <td th:text="${b.dueDate}"></td>
        <td th:text="${b.status}"></td>

        <td>
            <a th:href="@{/borrow-records/detail/{id}(id=${b.id})}">Chi tiết</a>
            <a th:href="@{/borrow-records/edit/{id}(id=${b.id})}">Sửa</a>
            <a th:href="@{/borrow-records/delete/{id}(id=${b.id})}"
               onclick="return confirm('Bạn có chắc muốn xóa phiếu mượn này không?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
