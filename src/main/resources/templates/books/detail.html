<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sách</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        .box {
            width: 600px;
            border: 1px solid #999;
            padding: 20px;
        }
        p {
            margin: 10px 0;
        }
    </style>
</head>
<body>

<h1>Chi tiết sách</h1>

<div class="box">
    <p><strong>ID:</strong> <span th:text="${book.id}"></span></p>
    <p><strong>Tên sách:</strong> <span th:text="${book.title}"></span></p>
    <p><strong>Tác giả:</strong> <span th:text="${book.author}"></span></p>
    <p><strong>Nhà xuất bản:</strong> <span th:text="${book.publisher}"></span></p>
    <p><strong>Năm xuất bản:</strong> <span th:text="${book.publicationYear}"></span></p>
    <p><strong>ISBN:</strong> <span th:text="${book.isbn}"></span></p>
    <p><strong>Tổng số lượng:</strong> <span th:text="${book.totalQuantity}"></span></p>
    <p><strong>Số lượng còn lại:</strong> <span th:text="${book.availableQuantity}"></span></p>
    <p><strong>Mô tả:</strong> <span th:text="${book.description}"></span></p>
</div>

<br>
<a th:href="@{/books}">Quay lại danh sách</a>
<a th:href="@{/books/edit/{id}(id=${book.id})}">Sửa</a>

</body>
</html>
