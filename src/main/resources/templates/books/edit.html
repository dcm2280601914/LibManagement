<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa sách</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        form {
            width: 500px;
        }
        div {
            margin-bottom: 12px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
        }
    </style>
</head>
<body>

<h1>Sửa thông tin sách</h1>

<form th:action="@{/books/update/{id}(id=${book.id})}" th:object="${book}" method="post">
    <div>
        <label>Tên sách:</label>
        <input type="text" th:field="*{title}" required>
    </div>

    <div>
        <label>Tác giả:</label>
        <input type="text" th:field="*{author}">
    </div>

    <div>
        <label>Nhà xuất bản:</label>
        <input type="text" th:field="*{publisher}">
    </div>

    <div>
        <label>Năm xuất bản:</label>
        <input type="number" th:field="*{publicationYear}" required>
    </div>

    <div>
        <label>ISBN:</label>
        <input type="text" th:field="*{isbn}">
    </div>

    <div>
        <label>Tổng số lượng:</label>
        <input type="number" th:field="*{totalQuantity}" required>
    </div>

    <div>
        <label>Số lượng còn lại:</label>
        <input type="number" th:field="*{availableQuantity}" required>
    </div>

    <div>
        <label>Mô tả:</label>
        <textarea th:field="*{description}" rows="4"></textarea>
    </div>

    <button type="submit">Cập nhật</button>
    <a th:href="@{/books}">Quay lại</a>
</form>

</body>
</html>
